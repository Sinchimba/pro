databases:
  - name: meet-postgres
    databaseName: meet2_db
    plan: free

services:
  - type: web
    name: meet-platform
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_VERSION
        value: "22.22.3"
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: meet-postgres
          property: connectionString
